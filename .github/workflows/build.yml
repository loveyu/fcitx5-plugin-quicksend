name: Build

on:
  push:
    branches: [main, dev]
    tags: ['v*']

jobs:
  debug:
    name: Debug Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Replace mirror sources with official sources
        run: |
          sed -i 's|mirrors.cloud.tencent.com/gradle|services.gradle.org/distributions|g' gradle/wrapper/gradle-wrapper.properties
          sed -i '/maven.aliyun.com/d' settings.gradle.kts

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: QuickSendPlugin-${{ github.ref_name }}-debug
          path: build/outputs/apk/debug/*.apk
          retention-days: 30

  release:
    name: Release Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Replace mirror sources with official sources
        run: |
          sed -i 's|mirrors.cloud.tencent.com/gradle|services.gradle.org/distributions|g' gradle/wrapper/gradle-wrapper.properties
          sed -i '/maven.aliyun.com/d' settings.gradle.kts

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "SIGNING_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build Release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLUGIN_VERSION: ${{ github.ref_name }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APK=$(find build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "QuickSendPlugin-${{ github.ref_name }}-release.apk"

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickSendPlugin-${{ github.ref_name }}-release
          path: QuickSendPlugin-${{ github.ref_name }}-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: QuickSendPlugin-${{ github.ref_name }}-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.keystore"
